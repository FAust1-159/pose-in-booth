<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AR Camera Interface</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="page page-camera">
  <main class="camera-shell">
    <video id="cameraFeed" class="camera-feed" autoplay muted playsinline></video>
    <canvas id="overlayCanvas" class="overlay-canvas"></canvas>

    <header class="top-bar">
      <a class="back-button" href="index.html">Back</a>
      <h1>Session Active</h1>
    </header>

    <section class="camera-layout">
      <div class="side-panel left-panel">
        <article class="score-box">
          <span>Accuracy:</span>
          <strong id="accuracyValue">0%</strong>
        </article>
        <article class="score-box timer-box">
          <strong id="timeValue">00:00</strong>
        </article>
      </div>

      <section class="pose-zone-wrap">
        <div class="pose-zone"></div>
      </section>

      <div class="side-panel right-panel">
        <article class="score-box">
          <span>Poses Hit:</span>
          <strong id="posesHitValue">0</strong>
        </article>
      </div>
    </section>

    <footer class="bottom-bar">
      <div class="bottom-left">
        <button id="toggleCutouts" class="utility-button" type="button">Poses</button>
      </div>

      <button id="captureButton" class="capture-button camera-icon-button" type="button" aria-label="Capture">
        <span class="camera-icon"></span>
      </button>

      <a class="utility-button end-button" href="index.html">End</a>
    </footer>

    <div id="sessionCompleteModal" class="pose-modal-overlay hidden">
      <div class="session-complete-modal">
        <header class="pose-modal-header session-complete-header">
          <h2>Session Complete</h2>
        </header>

        <div class="session-stats-grid">
          <article class="session-stat-card">
            <strong id="finalAccuracyValue">0%</strong>
            <span>Accuracy</span>
          </article>
          <article class="session-stat-card">
            <strong id="finalTimeValue">0:00</strong>
            <span>Time Duration</span>
          </article>
          <article class="session-stat-card">
            <strong id="finalPosesHitValue">0</strong>
            <span>Poses hit</span>
          </article>
        </div>

        <p class="session-complete-copy">What would you like to do next?</p>

        <footer class="session-complete-actions">
          <button id="playAgainButton" class="modal-button modal-confirm" type="button">Play Again</button>
          <a class="modal-button modal-confirm session-link-button" href="collections.html">Collection</a>
          <a class="modal-button modal-confirm session-link-button" href="index.html">Exit</a>
        </footer>
      </div>
    </div>

    <div id="countdownOverlay" class="countdown-overlay hidden" aria-live="polite">
      <div id="countdownValue" class="countdown-value">3</div>
    </div>

    <div id="poseModal" class="pose-modal-overlay hidden">
      <div class="pose-modal">
        <header class="pose-modal-header">
          <button id="closePoseModal" class="back-button pose-back-button" type="button">Back</button>
          <h2>Choose Pose</h2>
        </header>

        <div class="pose-filter-row">
          <button class="pose-filter active" type="button" data-filter="all">All</button>
          <button class="pose-filter" type="button" data-filter="easy">Easy</button>
          <button class="pose-filter" type="button" data-filter="medium">Medium</button>
          <button class="pose-filter" type="button" data-filter="hard">Hard</button>
        </div>

        <div id="poseGrid" class="pose-grid"></div>

        <footer class="pose-modal-actions">
          <button id="cancelPoseSelection" class="modal-button modal-cancel" type="button">Cancel</button>
          <button id="confirmPoseSelection" class="modal-button modal-confirm" type="button">Select</button>
        </footer>
      </div>
    </div>
  </main>

  <script src="camera.js"></script>
</body>
</html>
