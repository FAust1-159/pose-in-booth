<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Collections – Pose-In Booth</title>
  <link rel="stylesheet" href="css/global.css" />
  <link rel="stylesheet" href="css/collections.css" />
</head>
<body>

  <div class="collections-container">

    <header class="collections-header">
      <a href="index.html" class="btn-back">← Back</a>
      <h1 class="collections-title">Collections</h1>
      <p class="collections-count" id="collections-count">0 videos</p>
    </header>

    <!-- ── LOADING STATE ── -->
    <div class="collections-loading" id="collections-loading">
      <div class="spinner"></div>
      <p>Loading your videos...</p>
    </div>

    <!-- ── EMPTY STATE ── -->
    <div class="collections-empty hidden" id="collections-empty">
      <div class="empty-icon">🎞</div>
      <p>No recordings yet.</p>
      <a href="camera.html" class="btn btn-primary">Go make one!</a>
    </div>

    <!-- ── VIDEO GRID ── -->
    <div class="video-grid hidden" id="video-grid">
      <!--
        Each card is dynamically generated by collections.js
        and follows this structure:

        <div class="video-card" data-id="FIRESTORE_DOC_ID">
          <div class="video-thumb">
            <video src="VIDEO_URL" preload="metadata"></video>
            <div class="video-duration">0:00</div>
          </div>
          <div class="video-info">
            <span class="video-date">Apr 10, 2026</span>
            <span class="video-score">Accuracy: 87%</span>
          </div>
          <div class="video-actions">
            <button class="btn-action btn-replay">▶ Replay</button>
            <button class="btn-action btn-download">⬇ Save</button>
            <button class="btn-action btn-delete">🗑 Delete</button>
          </div>
        </div>
      -->
    </div>

    <!-- ── VIDEO PLAYER MODAL ── -->
    <div class="modal hidden" id="player-modal">
      <div class="modal-backdrop" id="modal-backdrop"></div>
      <div class="modal-content">
        <button class="btn-close" id="player-close">✕</button>
        <video id="player-video" controls></video>
      </div>
    </div>

    <!-- ── DELETE CONFIRM MODAL ── -->
    <div class="modal hidden" id="delete-modal">
      <div class="modal-backdrop" id="delete-backdrop"></div>
      <div class="modal-content modal-confirm">
        <h3>Delete this recording?</h3>
        <p>This can't be undone.</p>
        <div class="modal-actions">
          <button class="btn btn-secondary" id="delete-cancel">Cancel</button>
          <button class="btn btn-danger" id="delete-confirm">Delete</button>
        </div>
      </div>
    </div>

  </div>

  <!-- ── SCRIPTS ── -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>

  <script type="module">
    import { initCollections } from './js/collections.js';
    initCollections();
  </script>

</body>
</html>
