<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AR Game Lobby</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="page page-lobby">
  <main class="shell">
    <section class="stage-backdrop" aria-hidden="true">
      <div class="stage-curtain curtain-left"></div>
      <div class="stage-curtain curtain-right"></div>
      <div class="stage-floor"></div>
    </section>

    <section class="lobby-layout">
      <div class="logo-placeholder">
        <div class="logo-frame">
          <img class="logo-image" src="./PSBimg/logo.png" alt="Game logo">
        </div>
      </div>

      <nav class="menu-actions stage-menu" aria-label="Main menu">
        <a class="action action-primary stage-button" href="camera.html">Start</a>
        <a class="action action-secondary stage-button" href="collections.html">Collection</a>
        <button id="howToPlayButton" class="action action-secondary stage-button" type="button">How To Play</button>
      </nav>
    </section>
  </main>

  <div id="howToPlayModal" class="pose-modal-overlay hidden">
    <div class="pose-modal howto-modal">
      <header class="pose-modal-header">
        <button id="closeHowToPlay" class="back-button pose-back-button" type="button">Back</button>
        <h2>How To Play</h2>
      </header>

      <div class="howto-content">
        <p>Choose a pose, stand in front of the camera, and match the cutout as closely as you can.</p>
        <p>Press <strong>Capture</strong> to start, hold your position, and aim for the highest accuracy.</p>
        <p>Your clip saves automatically after the round and can be viewed in <strong>Collection</strong>.</p>
      </div>

      <footer class="pose-modal-actions">
        <button id="howToPlayDone" class="modal-button modal-confirm" type="button">Got It</button>
      </footer>
    </div>
  </div>

  <script src="index.js"></script>
</body>
</html>
